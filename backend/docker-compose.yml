version: '3.8'

services:
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Allocate storage volume for the app's virtual filesystem
      - stashes:/root/stashes
      - stashes-meta:/root/stashes-meta
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped

volumes:
  # Virtual filesystem storage with 1GB capacity
  stashes:
    driver: local
  stashes-meta:
    driver: local
