version: '3.8'

services:
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Allocate storage volume for the app's virtual filesystem
      - app-data:/root/stashes
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped

volumes:
  # Virtual filesystem storage with 1GB capacity
  app-data:
    driver: local
