services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Allocate storage volume for the app's virtual filesystem
      - stashes:/root/stashes
      - stashes-meta:/root/stashes-meta
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped

  tests:
    image: gradle:9.4.1-jdk21
    working_dir: /workspace
    command: ./gradlew test --no-daemon
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle

volumes:
  # Virtual filesystem storage with 1GB capacity
  stashes:
    driver: local
  stashes-meta:
    driver: local
  gradle-cache:
    driver: local
